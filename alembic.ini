# alembic 설정 — DB URL 은 env.py 가 주입 (sqlalchemy.url 비움).
# 실행: alembic upgrade head  /  검증(offline): alembic upgrade head --sql

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# sqlalchemy.url = <env.py 가 Settings.sqlalchemy_dsn 또는 ALEMBIC_DATABASE_URL 로 주입>

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
