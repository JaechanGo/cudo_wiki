# ── BizBox 첨부 다운로드 프록시 (Mixed Content 회피) ─────────────────────────────
#
# 문제: LibreChat 은 https(open-llm.cudo.co.kr:9977), BizBox 첨부는 http(gw.cudo.co.kr).
#       브라우저는 https 페이지에서의 http 파일 다운로드를 "Mixed Download" 로 자동 차단한다
#       → 첨부 링크 클릭 시 새 탭이 열리자마자 닫히고 아무 일도 안 일어남.
#       gw.cudo.co.kr 은 https 미지원(443 closed)이라 download_url 을 https 로 바꿀 수 없다.
#
# 해결: LibreChat 앞단 nginx 에 https 경로 `/bizbox-dl/` 를 만들어 gw 의 http 로 중계한다.
#       그리고 cudo-wiki-mcp 컨테이너에 아래 env 를 주면 download_url 이 이 https 경로로 생성된다:
#           ATTACHMENT_PROXY_BASE=https://open-llm.cudo.co.kr:9977/bizbox-dl
#       (미설정 시에는 http 직접 = 기존 동작, 클릭 다운로드는 여전히 차단됨)
#
# 적용: LibreChat 을 서빙하는 nginx 의 server 블록
#       (listen 443; server_name open-llm.cudo.co.kr;) 안에 아래 location 을 추가하고
#           nginx -t && nginx -s reload
#
# ⚠️ 선결 확인 — nginx 호스트(서버)에서 gw 로 HTTP 도달이 되는지:
#    과거 이 서버 IP 가 BizBox anti-bot 에 막힌 이력이 있다. 프록시 추가 전에 반드시 확인할 것.
#        curl -s -o /dev/null -w '%{http_code}\n' \
#          'http://gw.cudo.co.kr/edms/board/downloadFile.do?boardNo=74&fileNm=<실제파일>&fileRnm='
#    → 200 이면 OK. 403/차단/000 이면 프록시 불가(서버↔gw 망 점검 또는 별도 방안 필요).

location /bizbox-dl/ {
    # trailing slash 매칭: /bizbox-dl/edms/...  →  http://gw.cudo.co.kr/edms/...
    proxy_pass http://gw.cudo.co.kr/;
    proxy_set_header Host gw.cudo.co.kr;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
    proxy_buffering off;        # 큰 첨부 스트리밍(메모리 절약)
    proxy_read_timeout 60s;
    # gw 의 Content-Disposition: attachment 헤더는 그대로 전달되어 브라우저가 다운로드한다.
    # (downloadFile.do 는 인증 불필요 — curl 무쿠키 200 확인. 쿠키 전달 불요.)
}
